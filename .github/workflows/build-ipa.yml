name: Build iOS IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: List available schemes
        run: xcodebuild -list

      - name: Build Archive
        run: |
          xcodebuild -scheme GoFast \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/GoFast.xcarchive \
            clean archive

      - name: Export IPA (Development)
        run: |
          # Create export options for development signing
          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>development</string>
              <key>compileBitcode</key>
              <false/>
              <key>signingStyle</key>
              <string>automatic</string>
              <key>generateAppStoreInformation</key>
              <false/>
              <key>uploadBitcode</key>
              <false/>
              <key>uploadSymbols</key>
              <false/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath build/GoFast.xcarchive \
            -exportPath build \
            -exportOptionsPlist ExportOptions.plist
        continue-on-error: true

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GoFast-Driver
          path: build/GoFast.ipa
          retention-days: 90

      - name: Upload XCArchive Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GoFast-Archive
          path: build/GoFast.xcarchive
          retention-days: 90
