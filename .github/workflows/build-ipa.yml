name: Build iOS IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Archive
        run: |
          xcodebuild -scheme GoFast \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/GoFast.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            clean archive

      - name: Create IPA from Archive
        run: |
          cd build
          mkdir -p Payload
          cp -r GoFast.xcarchive/Products/Applications/GoFast.app Payload/
          zip -r GoFast.ipa Payload
          rm -rf Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: GoFast-Driver
          path: build/GoFast.ipa
          retention-days: 90

      - name: Upload XCArchive
        uses: actions/upload-artifact@v4
        with:
          name: GoFast-Archive
          path: build/GoFast.xcarchive
          retention-days: 90
